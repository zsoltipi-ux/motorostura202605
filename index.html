<script type="text/babel">
const MapBG = ({ style={}, children, dense=true }) => {
  const lines = [];
  for (let i=0;i<8;i++){
    const y = 40 + i*40;
    const d = `M-20 ${y} Q 80 ${y-20-i*3} 160 ${y} T 340 ${y-5} T 500 ${y+8}`;
    lines.push(<path key={i} d={d} stroke={i%3===0?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.05)'} strokeWidth={i%3===0?1:0.6} fill="none"/>);
  }
  return (
    <div style={{
      position:'relative', width:'100%', height:'100%',
      background: `radial-gradient(120% 90% at 30% 20%, #1A2238 0%, #0D1320 60%, #0A0D14 100%)`,
      overflow:'hidden', borderRadius: style.borderRadius || 0,
      ...style,
    }}>
      <svg width="100%" height="100%" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice" style={{position:'absolute',inset:0}}>
        <defs>
          <pattern id="mesh" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M0 0h40M0 0v40" stroke="rgba(255,255,255,0.03)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="400" height="600" fill="url(#mesh)"/>
        {lines}
        <path d="M-10 380 Q 100 340 180 400 T 410 380" stroke="rgba(111,169,255,0.15)" strokeWidth="2" fill="none"/>
        <circle cx="90" cy="150" r="70" fill="rgba(45,212,164,0.04)"/>
        <circle cx="310" cy="260" r="90" fill="rgba(245,158,11,0.03)"/>
        <circle cx="200" cy="480" r="100" fill="rgba(111,169,255,0.04)"/>
      </svg>
      {children}
    </div>
  );
};

const RoutePath = ({ d, color=MR.color.sunset, dashed=false, width=4 }) => (
  <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice">
    <path d={d} stroke="rgba(0,0,0,0.6)" strokeWidth={width+3} fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    <path d={d} stroke={color} strokeWidth={width} fill="none" strokeLinecap="round" strokeLinejoin="round"
      strokeDasharray={dashed?'6 6':'none'}/>
  </svg>
);

const MapPin = ({ x, y, label, kind='start', tone }) => {
  const bg = tone || (kind==='start' ? MR.color.ok : kind==='end' ? MR.color.sunset : MR.color.info);
  return (
    <div style={{
      position:'absolute', left:`${x}%`, top:`${y}%`,
      transform:'translate(-50%,-100%)', pointerEvents:'none',
    }}>
      <div style={{
        padding:'4px 9px', borderRadius:MR.rad.pill, background:bg, color:'#06080E',
        fontFamily:MR.font.display, fontSize:10, fontWeight:700, letterSpacing:0.4,
        textTransform:'uppercase', boxShadow:'0 4px 14px rgba(0,0,0,0.45)',
        whiteSpace:'nowrap',
      }}>{label}</div>
      <div style={{
        width:8, height:8, background:bg, borderRadius:'50%', margin:'2px auto 0',
        boxShadow:'0 0 0 3px rgba(0,0,0,0.35)',
      }}/>
    </div>
  );
};

const ROUTE_PILIS = "M50 500 Q 120 440 140 380 T 110 280 Q 90 220 160 180 Q 230 150 260 110 Q 300 80 350 90";
const ROUTE_BORZ  = "M80 480 Q 140 420 200 400 Q 280 390 320 320 Q 340 260 300 200";
const ROUTE_VEL   = "M70 510 Q 120 460 170 460 Q 260 480 320 430 Q 360 380 340 310";
const ROUTE_TET   = "M40 520 L80 460 L70 400 L130 360 L120 300 L190 260 L180 200 L250 160 L240 100 L320 60";

const Elevation = ({ height=72, accent=MR.color.sunset, variant=0 }) => {
  const paths = [
    "M0 60 L30 45 L60 50 L90 25 L120 30 L150 10 L180 20 L210 35 L240 15 L270 40 L300 55 L330 45 L360 60",
    "M0 50 L40 40 L80 55 L120 30 L160 45 L200 20 L240 40 L280 25 L320 35 L360 50",
    "M0 55 L40 50 L80 35 L120 40 L160 20 L200 25 L240 10 L280 30 L320 45 L360 40",
  ];
  const d = paths[variant % paths.length];
  return (
    <svg width="100%" height={height} viewBox={`0 0 360 ${height}`} preserveAspectRatio="none">
      <defs>
        <linearGradient id={`el-${variant}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={accent} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={`${d} L360 ${height} L0 ${height} Z`} fill={`url(#el-${variant})`}/>
      <path d={d} stroke={accent} strokeWidth="1.5" fill="none" strokeLinecap="round"/>
      {[0.33,0.66].map(f=>(
        <line key={f} x1="0" x2="360" y1={height*f} y2={height*f} stroke="rgba(255,255,255,0.06)" strokeDasharray="2 4"/>
      ))}
    </svg>
  );
};

const CurveMeter = ({ pct=87 }) => {
  const bars = 12;
  const filled = Math.round((pct/100)*bars);
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:2,height:28}}>
      {Array.from({length:bars}).map((_,i)=>(
        <div key={i} style={{
          width:3, height: 8 + (i/bars)*20,
          background: i<filled ? MR.color.sunset : 'rgba(255,255,255,0.08)',
          borderRadius:1,
        }}/>
      ))}
    </div>
  );
};

    <RoutePath d={ROUTE_PILIS} color={MR.color.sunset} width={4}/>

const Settings = ({ onBack, onGoto }) => (

    <div style={{padding:'118px 0 40px'}}>
      <div style={{padding:'0 20px'}}><SectionLabel>Navigáció</SectionLabel></div>

        <SettingRow I={Icon.group} t="Vészhelyzeti SOS" d="3 kontakt"/>

      <div style={{padding:'18px 20px 0'}}><SectionLabel>Adatvédelem · GDPR</SectionLabel></div>

);

const SettingRow = ({ I, t, d, toggle, last, danger }) => (
  <div style={{

// ───────────── Language modal ───────────────────────────────────────────
const LangModal = ({ onClose }) => (

Object.assign(window, {
  Profile, Paywall, Favorites, Settings, SettingRow, LangModal,

</script>
<script type="text/babel">
const TWEAKS = {
  accent: "sunset",
  density: "comfortable",
  startScreen: "home",
  showDesignSystem: false
};

const ACCENTS = {
  sunset: { name:'Naplemente narancs', color:'#FF6B35', color2:'#FF8A5C' },
  ember:  { name:'Ember bronz',        color:'#F49E3A', color2:'#FFC36B' },
  steel:  { name:'Steel kék',          color:'#6FA9FF', color2:'#8FB8FF' },
  moss:   { name:'Moss zöld',          color:'#2DD4A4', color2:'#5FE0B8' },
};

// Safe storage — many sandboxed previews (and privacy modes) throw SecurityError
// when accessing window.localStorage, so everything must be guarded.
const safeStore = {
  get(k){ try { return window.localStorage.getItem(k); } catch(e){ return null; } },
  set(k,v){ try { window.localStorage.setItem(k,v); } catch(e){} },
};

function App(){
  const [tweaks, setTweaks] = React.useState(()=>{
    try { return JSON.parse(safeStore.get('mr_tweaks')) || TWEAKS; }
    catch(e){ return TWEAKS; }
  });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [fullscreen, setFullscreen] = React.useState(()=> safeStore.get('mr_fs') === '1');
  const [screen, setScreen] = React.useState(()=>
    safeStore.get('mr_screen') || tweaks.startScreen || 'home');
  const [wizStep, setWizStep] = React.useState(0);
  const [wizData, setWizData] = React.useState({hours:4, type:'asphalt', who:'solo'});
  const [lang, setLang] = React.useState(false);

  // apply accent color to tokens dynamically
  React.useEffect(()=>{
    const a = ACCENTS[tweaks.accent] || ACCENTS.sunset;
    MR.color.sunset = a.color; MR.color.sunset2 = a.color2;
  }, [tweaks.accent]);

  React.useEffect(()=>{ safeStore.set('mr_screen', screen); }, [screen]);
  React.useEffect(()=>{ safeStore.set('mr_tweaks', JSON.stringify(tweaks)); }, [tweaks]);
  React.useEffect(()=>{ safeStore.set('mr_fs', fullscreen?'1':'0'); }, [fullscreen]);

  const setTweak = (patch) => setTweaks({...tweaks, ...patch});

  const go = (s) => {
    if(s==='lang'){ setLang(true); return; }
    if(s==='wizard'){ setWizStep(0); setScreen('wizard'); return; }
    setScreen(s);
  };

  const wizNext = () => {
    if(wizStep<3) setWizStep(wizStep+1);
    else setScreen('results');
  };
  const wizBack = () => {
    if(wizStep>0) setWizStep(wizStep-1);
    else setScreen('home');
  };

  const [onbStep, setOnbStep] = React.useState(0);
  const onbNext = () => {
    if(onbStep<2) setOnbStep(onbStep+1);
    else setScreen('home');
  };

  let content = null;
  if (screen==='onboarding') content = <Onboarding step={onbStep} onNext={onbNext} onSkip={()=>setScreen('home')}/>;
  else if (screen==='home')  content = <Home onGoto={go}/>;
  else if (screen==='wizard')content = <Wizard step={wizStep} onBack={wizBack} onNext={wizNext} data={wizData} setData={setWizData}/>;
  else if (screen==='results')content= <Results onBack={()=>{setWizStep(3);setScreen('wizard');}} onPick={()=>setScreen('details')}/>;
  else if (screen==='details')content= <Details onBack={()=>setScreen('results')} onStart={()=>setScreen('group')}/>;
  else if (screen==='group') content  = <Group onBack={()=>setScreen('home')}/>;
  else if (screen==='profile')content = <Profile onGoto={go}/>;
  else if (screen==='paywall')content = <Paywall onBack={()=>setScreen('home')}/>;
  else if (screen==='fav')   content  = <Favorites onBack={()=>setScreen('home')}/>;
  else if (screen==='settings')content= <Settings onBack={()=>setScreen('profile')} onGoto={go}/>;

  const showTab = !['onboarding','wizard','results','details','paywall','settings'].includes(screen);
  const activeTab = screen==='home'?'home':screen==='group'?'group':screen==='profile'?'profile':screen==='fav'?'home':'plan';

  const phoneContent = (
    <>{content}
      {showTab && <TabBar active={activeTab} onTab={(t)=>{
        if(t==='home') setScreen('home');
        if(t==='plan'){ setWizStep(0); setScreen('wizard'); }
        if(t==='group') setScreen('group');
        if(t==='profile') setScreen('profile');
      }}/>}
      {lang && <LangModal onClose={()=>setLang(false)}/>}
    </>
  );

  // ----- Fullscreen mode: just the app, no frame, no sidebars -----
  if (fullscreen) {
    return (
      <div style={{
        minHeight:'100vh', width:'100%',
        background:MR.color.bg, color:MR.color.text,
        fontFamily:"'Geist',sans-serif", position:'relative',
      }}>
        <div style={{maxWidth:480, margin:'0 auto', minHeight:'100vh',
          position:'relative', background:MR.color.bg, overflow:'hidden'}}>
          {phoneContent}
        </div>
        <FloatingControls fullscreen={fullscreen} setFullscreen={setFullscreen} setTweaksOpen={setTweaksOpen}/>
        {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak}
          fullscreen={fullscreen} setFullscreen={setFullscreen}
          close={()=>setTweaksOpen(false)}/>}
      </div>
    );
  }

  // ----- Design preview: 3-column layout with phone frame -----
  return (
    <div style={{
      minHeight:'100vh', width:'100%',
      background:'#06080E',
      position:'relative',
      fontFamily:"'Geist',sans-serif",
    }}>
      <Backdrop/>

      <div className="mr-grid" style={{
        maxWidth:1440, margin:'0 auto',
        padding:'40px 40px 80px',
        display:'grid',
        gridTemplateColumns:'1fr 440px 1fr',
        gap:32, alignItems:'start',
        position:'relative',
      }}>
        <div className="mr-sidebar">
          <LeftSidebar screen={screen} setScreen={(s)=>{
            if(s==='onboarding'){ setOnbStep(0); }
            if(s==='wizard'){ setWizStep(0); }
            setScreen(s);
          }}/>
        </div>

        <div className="mr-phone" style={{display:'flex',justifyContent:'center'}}>
          <div style={{position:'relative'}}>
            <PhoneFrame>{phoneContent}</PhoneFrame>
            <PhoneLabel screen={screen} wizStep={wizStep} onbStep={onbStep}/>
          </div>
        </div>

        <div className="mr-sidebar">
          <RightSidebar tweaks={tweaks}/>
        </div>
      </div>

      <FloatingControls fullscreen={fullscreen} setFullscreen={setFullscreen} setTweaksOpen={setTweaksOpen}/>
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak}
        fullscreen={fullscreen} setFullscreen={setFullscreen}
        close={()=>setTweaksOpen(false)}/>}
    </div>
  );
}

// ---- Floating controls (toggle fullscreen / open tweaks) ---------------
function FloatingControls({ fullscreen, setFullscreen, setTweaksOpen }){
  return (
    <div style={{
      position:'fixed', right:16, bottom:16, zIndex:999,
      display:'flex', flexDirection:'column', gap:8,
    }}>
      <button onClick={()=>setFullscreen(!fullscreen)} title={fullscreen?'Design preview':'App fullscreen'} style={{
        width:44, height:44, borderRadius:22,
        background:'rgba(14,19,32,0.92)', backdropFilter:'blur(16px)',
        border:'1px solid #2F3A56', color:'#F4F5F8',
        cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
        boxShadow:'0 8px 24px rgba(0,0,0,0.4)',
      }}>
        {fullscreen
          ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 10h16"/></svg>
          : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        }
      </button>
      <button onClick={()=>setTweaksOpen(true)} title="Tweaks" style={{
        width:44, height:44, borderRadius:22,
        background:'rgba(255,107,53,0.92)', color:'#06080E',
        border:'none', cursor:'pointer', display:'flex',
        alignItems:'center', justifyContent:'center',
        boxShadow:'0 8px 24px rgba(255,107,53,0.3)',
      }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  );
}

// ---- Phone frame ------------------------------------------------------
function PhoneFrame({ children }){
  return (
    <div style={{
      width:402, height:874, borderRadius:54, overflow:'hidden',
      position:'relative', background:'#000',
      boxShadow:'0 40px 100px rgba(0,0,0,0.6), 0 0 0 10px #12151C, 0 0 0 11px #1F242F',
    }}>
      <div style={{
        position:'absolute', top:13, left:'50%', transform:'translateX(-50%)',
        width:126, height:37, borderRadius:24, background:'#000', zIndex:80,
      }}/>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:70,
        padding:'18px 32px 0',display:'flex',justifyContent:'space-between',
        fontSize:15,fontWeight:600, color:'#fff', pointerEvents:'none',
      }}>
        <span style={{fontFamily:'Geist',letterSpacing:-0.2}}>9:41</span>
        <span style={{display:'flex',alignItems:'center',gap:6,fontSize:14}}>
          <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.7" fill="#fff"/><rect x="4.5" y="5" width="3" height="6" rx="0.7" fill="#fff"/><rect x="9" y="2" width="3" height="9" rx="0.7" fill="#fff"/><rect x="13.5" y="0" width="3" height="11" rx="0.7" fill="#fff"/></svg>
          <svg width="16" height="11" viewBox="0 0 16 11"><path d="M8 2.5 C10.5 2.5 12.5 3.5 14 5l1-1C13 2 10.5 1 8 1S3 2 1 4l1 1C3.5 3.5 5.5 2.5 8 2.5z" fill="#fff"/><circle cx="8" cy="9" r="1.3" fill="#fff"/></svg>
          <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="#fff" strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="18" height="8" rx="1.5" fill="#fff"/><rect x="22" y="4" width="1.5" height="4" rx="0.5" fill="#fff" fillOpacity="0.5"/></svg>
        </span>
      </div>
      <div style={{
        position:'absolute',bottom:0,left:0,right:0,zIndex:75,
        height:34,display:'flex',justifyContent:'center',alignItems:'flex-end',
        paddingBottom:8, pointerEvents:'none',
      }}>
        <div style={{width:139,height:5,borderRadius:3,background:'rgba(255,255,255,0.7)'}}/>
      </div>
      <div style={{width:'100%',height:'100%',position:'relative',overflow:'hidden'}}>
        {children}
      </div>
    </div>
  );
}

// ---- Phone caption ----------------------------------------------------
function PhoneLabel({ screen, wizStep, onbStep }){
  const labels = {
    onboarding:  ['01 · Onboarding · Intro', '02 · Onboarding · Smart planner', '03 · Onboarding · Group'][onbStep],
    home:        '04 · Home · Dashboard',
    wizard:      ['05 · Wizard 1 · Time', '06 · Wizard 2 · Start', '07 · Wizard 3 · Type', '08 · Wizard 4 · Who'][wizStep],
    results:     '09 · 3 ajánlat',
    details:     '10 · Túra részletek',
    group:       '11 · Élő csoport navigáció',
    profile:     '12 · Profil + statisztika',
    fav:         '13 · Kedvencek',
    paywall:     '14 · Pro upgrade',
    settings:    '15 · Beállítások',
  };
  return (
    <div style={{
      textAlign:'center', marginTop:24,
      fontFamily:"'Geist Mono',monospace", fontSize:11, letterSpacing:1.2,
      color:'#5F6A85', textTransform:'uppercase',
    }}>{labels[screen] || screen}</div>
  );
}

// ---- Backdrop ---------------------------------------------------------
function Backdrop(){
  return (
    <div className="grain" style={{
      position:'fixed', inset:0, pointerEvents:'none', zIndex:0,
      background:`
        radial-gradient(40% 40% at 20% 15%, rgba(255,107,53,0.08) 0%, transparent 60%),
        radial-gradient(60% 50% at 85% 90%, rgba(111,169,255,0.05) 0%, transparent 60%),
        #06080E
      `,
    }}/>
  );
}

// ---- Left sidebar — brand + screen selector --------------------------
function LeftSidebar({ screen, setScreen }){
  const screens = [
    {g:'Onboarding', items:[['onboarding','Bevezető (3)']]},
    {g:'Core flow',  items:[
      ['home','Home'],
      ['wizard','Tervező wizard (4)'],
      ['results','3 ajánlat'],
      ['details','Túra részletek'],
      ['group','Élő csoport'],
    ]},
    {g:'Account', items:[
      ['profile','Profil'],
      ['fav','Kedvencek'],
      ['paywall','Pro upgrade'],
      ['settings','Beállítások'],
    ]},
  ];
  return (
    <div style={{position:'sticky',top:40,zIndex:2}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:28}}>
        <LogoMark size={36}/>
        <div>
          <div style={{fontSize:18,fontWeight:600,letterSpacing:-0.3}}>MotoRoute</div>
          <div style={{fontSize:10,color:'#5F6A85',fontFamily:'Geist Mono',letterSpacing:1.5,
            textTransform:'uppercase'}}>v0.1 · Hi-fi</div>
        </div>
      </div>

      <div style={{fontSize:11,fontFamily:'Geist Mono',letterSpacing:1.4,
        textTransform:'uppercase',color:'#5F6A85',marginBottom:10}}>Tagline</div>
      <div style={{fontSize:22,fontWeight:600,letterSpacing:-0.4,lineHeight:1.2,marginBottom:20,
        color:'#F4F5F8'}}>
        Egy app.<br/>Két világ.<br/><span style={{color:'#FF6B35'}}>Kanyar és sár.</span>
      </div>
      <div style={{fontSize:13,color:'#97A0B5',lineHeight:1.6,marginBottom:28}}>
        Mobile-first PWA a brief alapján — dark-first, "modern motoros klasszikus". 15 hi-fi
        képernyő, teljes flow, magyar nyelvű tartalommal. Kattints a képernyőn és navigálj, vagy
        válassz alább.
      </div>

      {screens.map(s=>(
        <div key={s.g} style={{marginBottom:18}}>
          <div style={{fontSize:10,fontFamily:'Geist Mono',letterSpacing:1.6,
            textTransform:'uppercase',color:'#5F6A85',marginBottom:8}}>{s.g}</div>
          <div style={{display:'flex',flexDirection:'column',gap:2}}>
            {s.items.map(([k,name])=>{
              const on = screen===k;
              return (
                <button key={k} onClick={()=>setScreen(k)} style={{
                  padding:'8px 12px',borderRadius:8,
                  background: on ? 'rgba(255,107,53,0.12)' : 'transparent',
                  border:`1px solid ${on?'rgba(255,107,53,0.25)':'transparent'}`,
                  color: on ? '#FF6B35' : '#97A0B5',
                  fontSize:13,fontWeight:on?600:500,
                  textAlign:'left',cursor:'pointer',
                  display:'flex',alignItems:'center',gap:8,
                }}>
                  <span style={{width:4,height:4,borderRadius:'50%',
                    background:on?'#FF6B35':'#2F3A56'}}/>
                  {name}
                </button>
              );
            })}
          </div>
        </div>
      ))}

      <div style={{marginTop:14,padding:12,borderRadius:12,
        background:'rgba(255,255,255,0.03)', border:'1px solid #242C42'}}>
        <div style={{fontSize:11,fontFamily:'Geist Mono',letterSpacing:1.2,
          textTransform:'uppercase',color:'#5F6A85',marginBottom:8}}>Vezérlés</div>
        <div style={{fontSize:12,color:'#97A0B5',lineHeight:1.5}}>
          A jobb alsó <b style={{color:'#FF6B35'}}>Tweaks</b> gombbal
          váltasz accent színt vagy kezdő képernyőt. A teljes képernyős gomb
          elrejti a sidebart és csak az appot mutatja.
        </div>
      </div>
    </div>
  );
}

// ---- Right sidebar — design system snapshot --------------------------
function RightSidebar({ tweaks }){
  const palette = [
    {name:'bg',      v:'#0A0D14'},
    {name:'surface', v:'#141A28'},
    {name:'line',    v:'#242C42'},
    {name:'text',    v:'#F4F5F8'},
    {name:'muted',   v:'#97A0B5'},
    {name:'sunset',  v: ACCENTS[tweaks.accent]?.color || '#FF6B35'},
    {name:'ember',   v:'#F49E3A'},
    {name:'ok',      v:'#2DD4A4'},
    {name:'info',    v:'#6FA9FF'},
    {name:'err',     v:'#F05151'},
  ];
  return (
    <div style={{position:'sticky',top:40}}>
      <div style={{fontSize:11,fontFamily:'Geist Mono',letterSpacing:1.4,
        textTransform:'uppercase',color:'#5F6A85',marginBottom:12}}>Design system</div>

      <DSCard title="Logo-mark">
        <div style={{display:'flex',alignItems:'center',gap:16,padding:'10px 0'}}>
          <LogoMark size={48}/>
          <LogoMark size={32}/>
          <LogoMark size={20}/>
        </div>
        <div style={{marginTop:10,display:'flex',alignItems:'center',gap:10}}>
          <LogoMark size={28}/>
          <span style={{fontSize:18,fontWeight:600,letterSpacing:-0.3}}>MotoRoute</span>
        </div>
      </DSCard>

      <DSCard title="Típográfia · Geist">
        <div style={{fontSize:32,fontWeight:600,letterSpacing:-0.8,lineHeight:1.1}}>Kanyar.</div>
        <div style={{fontSize:20,fontWeight:500,letterSpacing:-0.3,marginTop:6}}>Közepes súly — 20</div>
        <div style={{fontSize:14,color:'#97A0B5',marginTop:4}}>Body szöveg — 14</div>
        <div style={{fontFamily:'Geist Mono',fontSize:11,letterSpacing:1.4,
          textTransform:'uppercase',color:'#5F6A85',marginTop:8}}>Mono · 187 KM · 3:40</div>
      </DSCard>

      <DSCard title="Paletta">
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6}}>
          {palette.map(c=>(
            <div key={c.name} style={{textAlign:'center'}}>
              <div style={{width:'100%',aspectRatio:'1',borderRadius:8,background:c.v,
                border:'1px solid rgba(255,255,255,0.06)'}}/>
              <div style={{marginTop:4,fontSize:9,fontFamily:'Geist Mono',
                letterSpacing:0.5,color:'#5F6A85',textTransform:'uppercase'}}>{c.name}</div>
            </div>
          ))}
        </div>
      </DSCard>

      <DSCard title="Motoros ikon-szett">
        <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
          {[
            ['bike','motor'],['curve','kanyar'],['dirt','földút'],['tet','TET'],['pano','panoráma'],
            ['time','idő'],['pin','hely'],['group','csoport'],['nav','nav'],['fuel','üzemanyag'],
          ].map(([k,n])=>(
            <div key={k} style={{textAlign:'center',padding:'10px 0',
              background:'rgba(255,255,255,0.02)',borderRadius:8,
              border:'1px solid #242C42'}}>
              {Icon[k]({s:20,c:'#F4F5F8'})}
              <div style={{marginTop:4,fontSize:9,color:'#5F6A85',
                fontFamily:'Geist Mono',letterSpacing:0.4}}>{n}</div>
            </div>
          ))}
        </div>
      </DSCard>

      <DSCard title="Chipek · tagek">
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          <Chip tone="asphalt">kanyargós</Chip>
          <Chip tone="gravel">földút</Chip>
          <Chip tone="tet">TET</Chip>
          <Chip tone="pano">panoráma</Chip>
          <Chip tone="ok">online</Chip>
          <Chip tone="sunset">Pro</Chip>
        </div>
      </DSCard>

      <DSCard title="Gombok">
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <button style={{width:'100%',height:44,borderRadius:12,
            background:'#FF6B35',color:'#06080E',border:'none',fontWeight:600,fontSize:14,
            fontFamily:'Geist',cursor:'pointer',
            boxShadow:'0 0 0 1px rgba(255,107,53,0.25), 0 8px 24px rgba(255,107,53,0.25)'}}>
            Primary · Tervezd meg
          </button>
          <button style={{width:'100%',height:44,borderRadius:12,
            background:'transparent',color:'#F4F5F8',
            border:'1px solid #2F3A56',fontWeight:500,fontSize:14,
            fontFamily:'Geist',cursor:'pointer'}}>Secondary</button>
          <button style={{width:'100%',height:40,borderRadius:10,
            background:'rgba(111,169,255,0.08)',color:'#6FA9FF',
            border:'1px solid rgba(111,169,255,0.2)',fontWeight:500,fontSize:13,
            fontFamily:'Geist',cursor:'pointer'}}>Ghost · info</button>
        </div>
      </DSCard>

      <DSCard title="Kanyarossági skála">
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {[{l:'Egyenes',v:15,c:'#6FA9FF'},{l:'Könnyű',v:45,c:'#F49E3A'},
            {l:'Kanyargós',v:72,c:'#FF8A5C'},{l:'Sport',v:92,c:'#FF6B35'}].map(r=>(
            <div key={r.l} style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:60,fontSize:11,color:'#97A0B5',fontFamily:'Geist Mono'}}>{r.l}</div>
              <div style={{flex:1,height:4,borderRadius:2,background:'#242C42',overflow:'hidden'}}>
                <div style={{width:`${r.v}%`,height:'100%',background:r.c}}/>
              </div>
              <div style={{width:30,textAlign:'right',fontSize:11,fontFamily:'Geist Mono',
                color:r.c,fontWeight:600}}>{r.v}%</div>
            </div>
          ))}
        </div>
      </DSCard>
    </div>
  );
}

function DSCard({ title, children }){
  return (
    <div style={{
      padding:16, marginBottom:12, borderRadius:16,
      background:'#0E1320', border:'1px solid #242C42',
    }}>
      <div style={{fontSize:10,fontFamily:'Geist Mono',letterSpacing:1.4,
        textTransform:'uppercase',color:'#5F6A85',marginBottom:10}}>{title}</div>
      {children}
    </div>
  );
}

// ---- Logo mark --------------------------------------------------------
function LogoMark({ size=32 }){
  return (
    <svg width={size} height={size} viewBox="0 0 48 48">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#FF6B35"/>
          <stop offset="100%" stopColor="#F49E3A"/>
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="48" height="48" rx="12" fill="#12151C"/>
      <path d="M10 36 Q 14 22 18 28 T 26 24 Q 30 22 32 14"
        stroke="url(#lg1)" strokeWidth="3.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx="10" cy="36" r="2.5" fill="#FF6B35"/>
      <circle cx="32" cy="14" r="2.5" fill="#F49E3A"/>
      <circle cx="38" cy="36" r="4" fill="none" stroke="#F4F5F8" strokeWidth="1.5"/>
      <circle cx="38" cy="36" r="1" fill="#F4F5F8"/>
    </svg>
  );
}

// ---- Tweaks panel -----------------------------------------------------
function TweaksPanel({ tweaks, setTweak, fullscreen, setFullscreen, close }){
  return (
    <div style={{
      position:'fixed', right:20, bottom:72, zIndex:1000,
      width:300, padding:16, borderRadius:18,
      background:'rgba(14,19,32,0.96)', backdropFilter:'blur(20px)',
      border:'1px solid #2F3A56',
      boxShadow:'0 20px 48px rgba(0,0,0,0.55)',
      color:'#F4F5F8',fontFamily:'Geist',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,letterSpacing:-0.2}}>Tweaks</div>
        <button onClick={close} style={{background:'none',border:'none',color:'#97A0B5',cursor:'pointer',padding:4}}>
          {Icon.close({s:16,c:'#97A0B5'})}
        </button>
      </div>

      <TweakLabel>Accent szín</TweakLabel>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
        {Object.entries(ACCENTS).map(([k,v])=>{
          const on = tweaks.accent===k;
          return (
            <button key={k} onClick={()=>setTweak({accent:k})} style={{
              padding:'8px 10px',borderRadius:10,
              background: on ? 'rgba(255,255,255,0.05)' : 'transparent',
              border:`1px solid ${on?v.color:'#242C42'}`,
              display:'flex',alignItems:'center',gap:8,cursor:'pointer',
            }}>
              <div style={{width:16,height:16,borderRadius:'50%',
                background:`linear-gradient(135deg,${v.color},${v.color2})`}}/>
              <span style={{fontSize:11,color:on?v.color:'#97A0B5',fontWeight:500}}>{v.name}</span>
            </button>
          );
        })}
      </div>

      <TweakLabel style={{marginTop:16}}>Megjelenítés</TweakLabel>
      <button onClick={()=>setFullscreen(!fullscreen)} style={{
        width:'100%',padding:'10px 12px',borderRadius:10,
        background:fullscreen?'rgba(255,107,53,0.12)':'#141A28',
        color:fullscreen?'#FF6B35':'#F4F5F8',
        border:`1px solid ${fullscreen?'rgba(255,107,53,0.3)':'#242C42'}`,
        fontFamily:'Geist',fontSize:13,cursor:'pointer',textAlign:'left',
        display:'flex',alignItems:'center',justifyContent:'space-between',
      }}>
        <span>{fullscreen ? 'App fullscreen' : 'Design preview (telefon + DS)'}</span>
        <span style={{fontFamily:'Geist Mono',fontSize:10,opacity:0.7}}>
          {fullscreen?'kikapcs':'bekapcs'}
        </span>
      </button>

      <TweakLabel style={{marginTop:16}}>Kezdő képernyő (refresh után)</TweakLabel>
      <select value={tweaks.startScreen} onChange={e=>setTweak({startScreen:e.target.value})}
        style={{
          width:'100%',padding:'10px 12px',borderRadius:10,
          background:'#141A28',color:'#F4F5F8',
          border:'1px solid #242C42',fontFamily:'Geist',fontSize:13,cursor:'pointer',
        }}>
        <option value="onboarding">Onboarding</option>
        <option value="home">Home</option>
        <option value="wizard">Wizard</option>
        <option value="results">3 ajánlat</option>
        <option value="details">Túra részletek</option>
        <option value="group">Élő csoport</option>
        <option value="profile">Profil</option>
        <option value="paywall">Paywall</option>
      </select>

      <div style={{marginTop:12,padding:10,borderRadius:8,background:'rgba(255,107,53,0.06)',
        border:'1px solid rgba(255,107,53,0.15)',fontSize:11,color:'#97A0B5',lineHeight:1.4}}>
        Változások localStorage-ban perzisztálnak. Accent szín élesben cserélődik,
        a design system snapshotban is frissül.
      </div>
    </div>
  );
}
function TweakLabel({ children, style={} }){
  return (
    <div style={{fontSize:10,fontFamily:'Geist Mono',letterSpacing:1.4,
      textTransform:'uppercase',color:'#5F6A85',marginBottom:6,...style}}>{children}</div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
